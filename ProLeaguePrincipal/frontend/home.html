<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - ProLeague</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- MAIN -->
  <main id="home-section" class="home-main">

    <!-- HERO / SLIDER -->
    <section class="hero-slider">
      <div class="slide" style="background-image:url('images/nba1.png')"></div>
      <div class="slide" style="background-image:url('images/nfl1.jpg')"></div>
      <div class="slide" style="background-image:url('images/nba2.jpg')"></div>
      <div class="slide" style="background-image:url('images/nfl2.jpg')"></div>
      <div class="slide" style="background-image:url('images/nfl3.jpg')"></div>
      <div class="slide" style="background-image:url('images/nfl4.jpg')"></div>
      <div class="slide" style="background-image:url('images/nba3.jpg')"></div>
      <div class="slide" style="background-image:url('images/nba4.jpg')"></div>

      <div class="slider-overlay">
        <div id="sports-clock" class="sports-clock">
          <div id="clock-time">00:00:00</div>
          <span id="clock-zone">NBA/NFL Time (ET)</span>
        </div>
        <h1>Bienvenido a ProLeague</h1>
        <p>Las últimas noticias y estadísticas de NBA y NFL en un solo lugar</p>
        <div class="home-buttons">
          <a href="nba.html" class="btn-primary">Ir a NBA</a>
          <a href="nfl.html" class="btn-secondary">Ir a NFL</a>
        </div>
      </div>
      <div class="slider-dots" id="slider-dots"></div>
    </section>

    <!-- SCOREBOARD (Partidos Recientes) -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 40px 0; max-width: 1400px; margin: 0 auto;">
      <h3 style="color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; margin: 0; text-transform: uppercase; letter-spacing: 1px;">Últimos Resultados</h3>
      <div id="scoreboard-filters" style="display: flex; gap: 10px;">
        <button class="sb-filter-btn active" data-sb="all" style="background: var(--primary-color); color: #000; border: none; padding: 6px 18px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Outfit';">Todos</button>
        <button class="sb-filter-btn" data-sb="NBA" style="background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 6px 18px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Outfit';">NBA</button>
        <button class="sb-filter-btn" data-sb="NFL" style="background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 6px 18px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Outfit';">NFL</button>
      </div>
    </div>

    <section class="scoreboard-section" style="background: rgba(5, 10, 15, 0.4); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 20px 0; overflow-x: auto; white-space: nowrap; display: flex; gap: 20px; align-items: center; scroll-behavior: smooth; margin-top: 15px; margin-bottom: 30px;">
      <div id="games-ticker" style="display: inline-flex; gap: 15px; padding: 0 40px; min-width: 100%;">
        <p style="color: #94a3b8; font-style: italic; margin: 0 auto;">Cargando últimos resultados de la NBA...</p>
      </div>
    </section>

    <!-- NOTICIAS -->
    <section class="news-section">
      <h2>Últimas Noticias</h2>

      <!-- BUSCADOR -->
      <div class="news-search-container">
        <input type="text" id="news-search" class="news-search-input" placeholder="Buscar noticias...">
      </div>

      <!-- FILTROS -->
      <div class="news-filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="nba">NBA</button>
        <button class="filter-btn" data-filter="nfl">NFL</button>
      </div>

      <!-- LISTA NOTICIAS -->
      <div class="news-list" id="news-list">
        <!-- Noticias cargadas por JS -->
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- HEADER / FOOTER LOAD -->
  <script src="app-home.js"></script>
  <script>
    fetch("header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
        if (typeof google !== "undefined" && google.translate) googleTranslateElementInit();
      });

    fetch("footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer-placeholder").innerHTML = html);
  </script>
</body>
</html>
