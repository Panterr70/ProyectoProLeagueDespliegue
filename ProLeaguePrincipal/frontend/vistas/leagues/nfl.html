<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProLeague - NFL</title>

  <link rel="stylesheet" href="../../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- MAIN -->
  <main class="nba-main nfl">
    <section id="nfl-section" style="display:none;">

      <h2 class="section-title">Equipos NFL</h2>
      
      <!-- CLASIFICACIÓN NFL -->
      <section class="standings-section">
        <h3 class="section-title">
          🏈 Clasificación Actual NFL
          <button onclick="cargarClasificacion()" style="background:none; border:none; cursor:pointer; font-size:0.6em; margin-left:10px;" title="Actualizar">🔄</button>
        </h3>
        <div class="standings-container">
          <table id="standings-table">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Equipo</th>
                <th>G</th>
                <th>P</th>
                <th>Porc. Gan.</th>
              </tr>
            </thead>
            <tbody>
              <!-- Se llena desde JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- ===================== -->
      <!-- ANALYTICS DASHBOARD -->
      <!-- ===================== -->
      <section class="analytics-section">
        <div class="analytics-header">
          <h3>📊 Análisis de la Liga</h3>
          <p>Distribución general de los equipos NFL</p>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            <h4>Top 5 (Victorias)</h4>
            <canvas class="chart-box" id="chart_top5"></canvas>
          </div>

          <div class="chart-card">
            <h4>Global Liga (G/P)</h4>
            <canvas class="chart-box" id="chart_global_winloss"></canvas>
          </div>

          <div class="chart-card">
            <h4>Eficiencia (Pts)</h4>
            <canvas class="chart-box" id="chart_points"></canvas>
          </div>

          <div class="chart-card">
            <h4>Radar Top 5</h4>
            <canvas class="chart-box" id="chart_radar"></canvas>
          </div>
        </div>
      </section>

      <!-- FAVORITOS -->
      <div class="favorites-toggle">
        <a href="../user/favorites.html" class="btn-secondary">⭐ Ver Mis Favoritos</a>
      </div>

      <!-- EQUIPOS -->
      <div class="team-list" id="team-list"></div>

      <!-- MODAL -->
      <div id="team-modal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
          <span id="modal-close" class="close">&times;</span>
          <img id="modal-logo" class="modal-logo">
          <h2 id="modal-name"></h2>
          <p id="modal-city"></p>
          <p id="modal-conference"></p>
          <p id="modal-division"></p>
          <div id="modal-stats"></div>
          
          <button id="btn-load-players" class="btn-primary" style="margin-top: 20px; width: 100%;">Ver Equipo</button>
          <div id="modal-players" style="margin-top: 20px; display: none;"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script type="module" src="../../js/leagues/app-nfl.js"></script>
</body>
</html>
