<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProLeague - NBA</title>

  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- MAIN -->
  <main class="nba-main">
    <section id="nba-section" style="display:none;">

      <!-- CLASIFICACIÓN NBA -->
      <section class="standings-section">
        <h3 class="section-title">
          <i class="fas fa-basketball-ball"></i> Clasificación Actual NBA 
          <button onclick="cargarClasificacion()" class="refresh-btn" title="Actualizar">
            <i class="fas fa-sync-alt"></i>
          </button>
        </h3>

        <div class="standings-container">
          <table id="standings-table">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Equipo</th>
                <th>G</th>
                <th>P</th>
                <th>Porc. Gan.</th>
              </tr>
            </thead>
            <tbody>
              <!-- Se llena desde JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- ANALYTICS DASHBOARD -->
      <section class="analytics-section">
        <div class="analytics-header">
          <h3><i class="fas fa-chart-pie"></i> Análisis de la Liga</h3>

          <p>Distribución general de los equipos NBA</p>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            <h4>Top 5 (Victorias)</h4>
            <canvas class="chart-box" id="chart_top5"></canvas>
          </div>

          <div class="chart-card">
            <h4>Global Liga (G/P)</h4>
            <canvas class="chart-box" id="chart_global_winloss"></canvas>
          </div>

          <div class="chart-card">
            <h4>Eficiencia (Pts)</h4>
            <canvas class="chart-box" id="chart_points"></canvas>
          </div>

          <div class="chart-card">
            <h4>Radar Top 3</h4>
            <canvas class="chart-box" id="chart_radar"></canvas>
          </div>

          <div class="chart-card">
            <h4>Home vs Away</h4>
            <canvas class="chart-box" id="chart_homeaway"></canvas>
          </div>

          <div class="chart-card">
            <h4>Racha Actual</h4>
            <canvas class="chart-box" id="chart_streaks"></canvas>
          </div>
        </div>
      </section>

      <!-- FAVORITOS -->
      <div class="favorites-toggle">
        <a href="../user/favorites.html" class="btn-secondary">⭐ Ver Mis Favoritos</a>
      </div>

      <!-- EQUIPOS -->
      <div class="team-list" id="team-list"></div>

      <!-- MODAL -->
      <div id="team-modal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
          <span id="modal-close" class="close">&times;</span>
          <img id="modal-logo" class="modal-logo">
          <h2 id="modal-name"></h2>
          <p id="modal-city"></p>
          <p id="modal-conference"></p>
          <p id="modal-division"></p>
          <div id="modal-stats"></div>
          
          <button id="btn-load-players" class="btn-primary" style="margin-top: 20px; width: 100%;">Ver Equipo</button>
          <div id="modal-players" style="margin-top: 20px; display: none;"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script type="module" src="../../js/leagues/app-nba.js"></script>
</body>
</html>
