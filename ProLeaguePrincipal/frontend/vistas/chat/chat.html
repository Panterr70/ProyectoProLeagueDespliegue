<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat en Vivo - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Socket.io CDN -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- MAIN -->
  <main class="chat-main">
    <div class="chat-container">
      
      <!-- NBA SECTION -->
      <section class="chat-section chat-nba" id="nba-chat-section">
        <div class="chat-header">
          <img src="../../images/nba-logo.png" alt="NBA" class="chat-logo">
          <h2>NBA Live Chat</h2>
        </div>
        <div class="chat-messages" id="nba-messages">
          <!-- Mensajes dinámicos -->
        </div>
        <form class="chat-form" id="nba-form">
          <input type="text" id="nba-input" placeholder="Comenta la jornada NBA..." autocomplete="off">
          <button type="submit">Enviar</button>
        </form>
      </section>

      <!-- NFL SECTION -->
      <section class="chat-section chat-nfl" id="nfl-chat-section">
        <div class="chat-header">
          <img src="../../images/nfl-logo.png" alt="NFL" class="chat-logo">
          <h2>NFL Live Chat</h2>
        </div>
        <div class="chat-messages" id="nfl-messages">
          <!-- Mensajes dinámicos -->
        </div>
        <form class="chat-form" id="nfl-form">
          <input type="text" id="nfl-input" placeholder="Debate sobre la NFL..." autocomplete="off">
          <button type="submit">Enviar</button>
        </form>
      </section>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script src="../../js/chat/chat.js"></script>
  <script>
    // Cargar Header y Footer
    fetch("../components/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
        if (typeof google !== "undefined" && google.translate) googleTranslateElementInit();

        const user = JSON.parse(localStorage.getItem("user"));
        const logoutLink = document.getElementById("nav-logout");
        
        // Chat protegido: si no hay usuario, redirigir a login
        if (!user) {
          window.location.href = "../auth/login.html";
        }

        if (user && logoutLink) logoutLink.style.display = "inline";
        
        if (logoutLink) logoutLink.addEventListener("click", e => {
          e.preventDefault();
          localStorage.removeItem("user");
          window.location.href = "../auth/login.html";
        });
      });

    fetch("../components/footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer-placeholder").innerHTML = html);
  </script>
</body>
</html>
