<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat en Vivo - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="dynamic-body">

  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>


  <!-- MAIN -->
  <main class="chat-main-v2">
    <div class="chat-layout">
      
      <!-- SIDEBAR -->
      <aside class="chat-sidebar">
        <div class="sidebar-header">
          <h3>Canales</h3>
        </div>
        <ul class="channel-list">
          <li class="channel-item active" data-room="general">
            <span class="channel-hash">#</span> general
          </li>
          <li class="channel-item" data-room="nba">
            <span class="channel-hash">#</span> nba-chat
          </li>
          <li class="channel-item" data-room="nfl">
            <span class="channel-hash">#</span> nfl-chat
          </li>
          <li class="channel-item" data-room="rumores">
            <span class="channel-hash">#</span> rumores
          </li>
        </ul>
        
        <div class="sidebar-user">
          <div class="user-avatar-mini" id="sidebar-avatar">U</div>
          <div class="user-info">
            <span id="sidebar-username">Usuario</span>
            <small>En línea 🟢</small>
          </div>
        </div>
      </aside>

      <!-- CHAT CONTENT -->
      <section class="chat-content">
        <div class="chat-view-header">
          <div class="header-info">
            <span class="header-hash">#</span>
            <h2 id="current-room-name">general</h2>
          </div>
          <div class="header-actions">
             <span id="user-count">... personas</span>
          </div>
        </div>

        <div class="chat-messages-v2" id="chat-messages-container">
          <div class="loading-chat">Selecciona un canal para empezar...</div>
        </div>

        <form class="chat-form-v2" id="chat-form">
          <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Enviar mensaje a #general..." autocomplete="off">
            <button type="submit" id="send-btn">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </form>

      </section>

    </div>
  </main>


  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script type="module" src="../../js/chat/chat.js"></script>
  <script type="module">
    import { initHeaderLogic } from "../../js/utils/header-logic.js";

    // Cargar Header
    fetch("../components/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
        initHeaderLogic();
      });

    // Cargar Footer
    fetch("../components/footer.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("footer-placeholder").innerHTML = html;
      });
  </script>

</body>
</html>
