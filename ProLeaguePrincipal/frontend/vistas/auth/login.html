<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <main class="login-register-container">
    <section id="login-section">
      <img src="../../logos/logo-png.png" alt="ProLeague Logo" class="auth-logo">
      <h2>Inicia sesión</h2>

      <form id="login-form">
        <input type="text" id="login-username" placeholder="Usuario o email" required>
        <div class="password-container">
          <input type="password" id="login-password" placeholder="Contraseña" required>
          <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Mostrar contraseña">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
          <a href="#" id="forgot-password-link" style="font-size: 0.8rem; opacity: 0.7; color: var(--text-main); text-decoration: none;">¿Has olvidado tu contraseña?</a>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <p id="login-error"></p>
      <p>¿No tienes cuenta? <a href="../auth/register.html">Regístrate</a></p>
    </section>  
  </main>

  <script type="module">
    import { auth, db } from "../../js/config/firebase-config.js";
    import { API_BASE_URL } from "../../js/config/config.js";
    import { signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // TOAST UTILITY
    window.showToast = function(message, type = 'success', duration = 3500) {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type]||'📢'}</span><span class="toast-message">${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('toast-visible')));
      setTimeout(() => { toast.classList.remove('toast-visible'); toast.classList.add('toast-hiding'); setTimeout(() => toast.remove(), 400); }, duration);
    }

    const loginForm = document.getElementById("login-form");
    const togglePassword = document.getElementById("toggle-password");
    const passwordInput = document.getElementById("login-password");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      
      if (type === "password") {
        togglePassword.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
      } else {
        togglePassword.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-off-icon"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;
      }
    });


    loginForm.addEventListener("submit", async e => {
      e.preventDefault();
      const input = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;
      let email = input;

      showToast("Verificando credenciales...", 'info', 2000);

      try {
        // 1. Si el input no es un email (no tiene @), buscar por username en el BACKEND
        if (!input.includes("@")) {
          const response = await fetch(`${API_BASE_URL}/api/auth/find-email/${input}`);
          if (!response.ok) {
            showToast("Nombre de usuario no encontrado", 'error');
            return;
          }
          const data = await response.json();
          email = data.email;
        }

        // 2. Iniciar sesión con Firebase Auth
        let userCredential;
        try {
          userCredential = await signInWithEmailAndPassword(auth, email, password);
        } catch (authErr) {
          console.error("Auth Error:", authErr);
          if (authErr.code === 'auth/invalid-credential') {
             showToast("Usuario o contraseña incorrectos", 'error');
          } else {
             showToast("Error al iniciar sesión", 'error');
          }
          return;
        }

        let user = userCredential.user;

        // Forzar recarga del usuario para obtener el estado de verificación más reciente
        await user.reload();
        user = auth.currentUser; 

        // 3. Verificar si el email está validado
        if (!user.emailVerified) {
          showToast("Tu correo no ha sido verificado. Revisa tu bandeja de entrada.", 'warning', 6000);
          await auth.signOut();
          localStorage.removeItem("user");
          return; 
        }

        // 4. Obtener datos adicionales desde Firestore
        let userData = {};
        const userDoc = await getDoc(doc(db, "users", user.uid));
        userData = userDoc.exists() ? userDoc.data() : {};

        // 5. Generar y guardar Session ID
        const sessionId = Date.now().toString();
        await setDoc(doc(db, "users", user.uid), {
          lastLogin: new Date().toISOString(),
          currentSessionId: sessionId
        }, { merge: true });

        // 6. Guardar en localStorage
        const userObj = {
          uid: user.uid,
          email: user.email,
          username: userData.username || user.displayName || "Usuario",
          bio: userData.bio || "",
          avatar: userData.avatar || "",
          favorites: userData.favorites || [],
          sessionId: sessionId
        };
        localStorage.setItem("user", JSON.stringify(userObj));

        // 7. AUTO-SINCRO CON MYSQL [Garantiza que el usuario exista para login por Username]
        fetch(`${API_BASE_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            username: userObj.username, 
            email: userObj.email, 
            password: 'firebase_synced_user' // Password placeholder (la real está en Firebase)
          })
        }).catch(() => {}); // Ignoramos errores si ya existe

        showToast("¡Bienvenido de nuevo, " + userObj.username + "!", 'success');
        setTimeout(() => { window.location.href = "../home/home.html"; }, 1000);

      } catch (err) {
        console.error("General Login Error:", err);
        showToast("Error inesperado: " + err.message, 'error');
      }
    });

    // FUNCIONALIDAD: RECUPERAR CONTRASEÑA
    document.getElementById("forgot-password-link").addEventListener("click", async (e) => {
      e.preventDefault();
      const emailOrUser = document.getElementById("login-username").value.trim();
      
      if (!emailOrUser) {
        showToast("Escribe tu email o usuario arriba para recuperarla", 'warning');
        return;
      }

      let email = emailOrUser;
      
      try {
        showToast("Buscando cuenta...", 'info', 1500);
        // Si no es email (no tiene @), buscamos el email asociado al username en el BACKEND
        if (!emailOrUser.includes("@")) {
          const response = await fetch(`${API_BASE_URL}/api/auth/find-email/${emailOrUser}`);
          if (!response.ok) {
            showToast("Nombre de usuario no encontrado", 'error');
            return;
          }
          const data = await response.json();
          email = data.email;
        }

        await sendPasswordResetEmail(auth, email);
        showToast("¡Enlace enviado! Revisa la bandeja de entrada vinculada a esta cuenta.", 'success', 6000);
      } catch (err) {
        console.error(err);
        showToast("Error al enviar email: " + err.message, 'error');
      }
    });

  </script>
</body>
</html>
