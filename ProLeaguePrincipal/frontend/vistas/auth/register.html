<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <main class="login-register-container">
    <section id="register-section">
      <img src="../../logos/logo-png.png" alt="ProLeague Logo" class="auth-logo">
      <h2>Regístrate</h2>

      <form id="register-form">
        <input type="text" id="register-username" placeholder="Usuario" required>
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Contraseña" required>
        <button type="submit">Crear cuenta</button>
      </form>

      <p id="register-error"></p>
      <p>¿Ya tienes cuenta? <a href="../auth/login.html">Inicia sesión</a></p>
    </section>
  </main>

  <div id="toast-container"></div>
  <script type="module">
    import { auth, db } from "../../js/config/firebase-config.js";
    import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // TOAST UTILITY
    window.showToast = function(message, type = 'success', duration = 3500) {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type]||'📢'}</span><span class="toast-message">${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('toast-visible')));
      setTimeout(() => { toast.classList.remove('toast-visible'); toast.classList.add('toast-hiding'); setTimeout(() => toast.remove(), 400); }, duration);
    }

    const registerForm = document.getElementById("register-form");

    registerForm.addEventListener("submit", async e => {
      e.preventDefault();
      const username = document.getElementById("register-username").value;
      const email = document.getElementById("register-email").value;
      const password = document.getElementById("register-password").value;

      try {
        // 1. Crear usuario en Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Actualizar perfil con el nombre de usuario
        await updateProfile(user, { displayName: username });

        // 3. Guardar datos adicionales en Firestore
        try {
          await setDoc(doc(db, "users", user.uid), {
            username: username,
            email: email,
            createdAt: new Date().toISOString(),
            bio: "¡Hola! Soy nuevo en ProLeague.",
            favorites: []
          });
        } catch (dbErr) {
          console.error("Firestore Error:", dbErr);
          showToast("Usuario creado en Auth, pero error en Firestore. ¿Está activado?", 'warning');
        }

        showToast("¡Cuenta creada con éxito! 🎉", 'success');
        
        // Guardar para sesión actual
        localStorage.setItem("user", JSON.stringify({
          uid: user.uid,
          email: user.email,
          username: username,
          bio: "¡Hola! Soy nuevo en ProLeague.",
          favorites: []
        }));

        setTimeout(() => { window.location.href = "../home/home.html"; }, 1500);

      } catch (err) {
        console.error("Registration Error:", err);
        if (err.code === 'auth/email-already-in-use') {
          showToast("El correo ya está registrado", 'error');
        } else if (err.code === 'auth/weak-password') {
          showToast("La contraseña es muy débil", 'warning');
        } else {
          showToast("Error al crear la cuenta", 'error');
        }
      }
    });
  </script>
</body>
</html>
