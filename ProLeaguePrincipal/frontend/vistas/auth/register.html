<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <main class="login-register-container">
    <section id="register-section">
      <img src="../../logos/logo-png.png" alt="ProLeague Logo" class="auth-logo">
      <h2>Regístrate</h2>

      <form id="register-form">
        <input type="text" id="register-username" placeholder="Usuario" required>
        <input type="email" id="register-email" placeholder="Email" required>
        <div class="password-container">
          <input type="password" id="register-password" placeholder="Contraseña" required>
          <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Mostrar contraseña">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button type="submit">Crear cuenta</button>
      </form>

      <p id="register-error"></p>
      <p>¿Ya tienes cuenta? <a href="../auth/login.html">Inicia sesión</a></p>
    </section>
  </main>

  <div id="toast-container"></div>
  <script type="module">
    import { auth, db } from "../../js/config/firebase-config.js";
    import { API_BASE_URL } from "../../js/config/config.js";
    import { createUserWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // TOAST UTILITY
    window.showToast = function(message, type = 'success', duration = 3500) {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type]||'📢'}</span><span class="toast-message">${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('toast-visible')));
      setTimeout(() => { toast.classList.remove('toast-visible'); toast.classList.add('toast-hiding'); setTimeout(() => toast.remove(), 400); }, duration);
    }

    const registerForm = document.getElementById("register-form");
    const togglePassword = document.getElementById("toggle-password");
    const passwordInput = document.getElementById("register-password");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      
      if (type === "password") {
        togglePassword.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
      } else {
        togglePassword.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-off-icon"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;
      }
    });


    registerForm.addEventListener("submit", async e => {
      e.preventDefault();
      const username = document.getElementById("register-username").value.trim();
      const email = document.getElementById("register-email").value.trim();
      const password = document.getElementById("register-password").value;

      // Validación extra frontend
      if (password.length < 6) {
        showToast("La contraseña debe tener al menos 6 caracteres", 'warning');
        return;
      }

      try {
        // 1. Crear usuario en Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Enviar email de verificación (QoL: Validación de existencia real)
        await sendEmailVerification(user);
        showToast("Correo de verificación enviado. ¡Revisa tu bandeja!", 'info');

        // 3. Actualizar perfil con el nombre de usuario
        await updateProfile(user, { displayName: username });

        // 4. Guardar datos adicionales en Firestore
        const sessionId = Date.now().toString();
        await setDoc(doc(db, "users", user.uid), {
          username: username,
          email: email,
          createdAt: new Date().toISOString(),
          bio: "¡Hola! Soy nuevo en ProLeague.",
          favorites: [],
          lastLogin: new Date().toISOString(),
          currentSessionId: sessionId
        });

        // 5. SINCRONIZAR CON MYSQL (Backend) [GOD MODE]
        try {
          await fetch(`${API_BASE_URL}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
          });
        } catch (syncErr) {
          console.warn("Aviso: Sincronización MySQL fallida, pero cuenta Firebase creada.");
        }

        showToast("¡Cuenta creada! Revisa tu email para verificarla antes de entrar.", 'info', 5000);
        
        // Cerrar sesión inmediatamente para que no entre al Home automáticamente
        await auth.signOut();
        
        setTimeout(() => { window.location.href = "./login.html"; }, 3000);

      } catch (err) {
        console.error("Registration Error:", err);
        if (err.code === 'auth/email-already-in-use') {
          showToast("El correo ya está registrado", 'error');
        } else if (err.code === 'auth/weak-password') {
          showToast("La contraseña es muy débil", 'warning');
        } else if (err.code === 'auth/invalid-email') {
          showToast("El formato del correo no es válido", 'error');
        } else {
          showToast("Error al crear la cuenta: " + err.message, 'error');
        }
      }
    });
  </script>
</body>
</html>
