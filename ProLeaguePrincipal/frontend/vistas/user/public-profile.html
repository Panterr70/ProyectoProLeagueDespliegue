<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario - ProLeague</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <main class="profile-main">
    <section class="profile-header-social">
      <div class="profile-banner">
          <img id="public-avatar" src="" alt="Avatar">
      </div>

      <div class="profile-details">
          <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
              <h2 id="public-username">Cargando...</h2>
              <button id="copy-profile-link" class="copy-btn-mini" title="Copiar enlace al perfil" style="padding: 8px 12px; font-size: 0.9rem;">
                  🔗 Compartir
              </button>
          </div>
          <p id="public-bio" class="bio-text">...</p>
      </div>

    </section>

    <!-- EQUIPOS IDEALES -->
    <section class="public-teams">
        <div class="league-tabs">
            <button class="tab-btn active" data-league="NBA">NBA</button>
            <button class="tab-btn" data-league="NFL">NFL</button>
        </div>

        <div class="court-container">
            <div id="sport-field" class="basketball-court">
                <!-- Se llenará con los slots del usuario buscado -->
            </div>
        </div>
    </section>

    <section class="public-favorites">
        <h3>Equipos Favoritos</h3>
        <div id="fav-list" class="fav-mini-grid">
            <!-- Logos de equipos favoritos -->
        </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="../../js/user/public-profile.js"></script>
  <script>
    fetch("../components/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
        
        // Activar menú móvil
        const menuBtn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('nav-menu');
        if(menuBtn && menu) {
          menuBtn.onclick = () => {
            menu.classList.toggle('active');
            menuBtn.classList.toggle('active');
          };
        }
      });

    fetch("../components/footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer-placeholder").innerHTML = html);
  </script>
</body>
</html>
