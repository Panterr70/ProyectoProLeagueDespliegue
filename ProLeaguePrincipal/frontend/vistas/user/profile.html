<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - ProLeague</title>

  <link rel="stylesheet" href="../../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dynamic-body">
  <div class="dynamic-bg"></div>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- MAIN -->
  <main class="profile-main">

    <section class="profile-card">
      <div class="profile-avatar">
        <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar">
        <label class="upload-btn">
          Cambiar imagen
          <input type="file" id="avatar-input" accept="image/*" hidden>
        </label>
      </div>

      <div class="profile-info">
        <h2 id="profile-username">Usuario</h2>
        <p id="profile-email">email@email.com</p>

        <label>Sobre mí</label>
        <textarea id="profile-bio" placeholder="Cuéntanos algo sobre ti..."></textarea>

        <button id="save-profile" class="btn-primary">Guardar cambios</button>
      </div>
    </section>

    <!-- MI QUINTETO / OFENSIVA DISPLAY -->
    <section class="profile-dreamteam">
      <h3>Mi Quinteto NBA</h3>
      <div id="nba-mini-grid" class="dreamteam-mini-grid">
         <div class="dt-mini-card"><span>PG</span> <strong id="nba-PG">-</strong></div>
         <div class="dt-mini-card"><span>SG</span> <strong id="nba-SG">-</strong></div>
         <div class="dt-mini-card"><span>SF</span> <strong id="nba-SF">-</strong></div>
         <div class="dt-mini-card"><span>PF</span> <strong id="nba-PF">-</strong></div>
         <div class="dt-mini-card"><span>C</span> <strong id="nba-C">-</strong></div>
      </div>

      <h3>Mi Ofensiva NFL</h3>
      <div id="nfl-mini-grid" class="dreamteam-mini-grid">
         <div class="dt-mini-card"><span>QB</span> <strong id="nfl-QB">-</strong></div>
         <div class="dt-mini-card"><span>RB</span> <strong id="nfl-RB">-</strong></div>
         <div class="dt-mini-card"><span>WR1</span> <strong id="nfl-WR1">-</strong></div>
         <div class="dt-mini-card"><span>WR2</span> <strong id="nfl-WR2">-</strong></div>
         <div class="dt-mini-card"><span>TE</span> <strong id="nfl-TE">-</strong></div>
      </div>
      <a href="./dreamteam.html" class="btn-link">Editar equipos →</a>
    </section>

    <!-- EQUIPOS FAVORITOS -->
    <section class="profile-favorites">
      <h3>Mis Equipos Favoritos</h3>
      <div id="favorites-container" class="fav-grid-premium">
        <!-- Se carga dinámicamente -->
      </div>
    </section>

    <section class="profile-security">
      <h3>Seguridad</h3>

      <form id="security-form" onsubmit="return false;">
        <div class="security-fields">
          <input type="text" id="new-username" placeholder="Nuevo nombre de usuario" autocomplete="username">
          <input type="password" id="new-password" placeholder="Nueva contraseña" autocomplete="new-password">
        </div>

        <button type="button" id="change-credentials" class="btn-danger">
          Actualizar credenciales
        </button>
      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- JS -->
  <script type="module" src="../../js/user/profile.js"></script>

  <script>
    fetch("../components/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;

        if (typeof google !== "undefined" && google.translate) {
          googleTranslateElementInit();
        }

        const user = JSON.parse(localStorage.getItem("user"));
        const logoutLink = document.getElementById("nav-logout");
        const profileLink = document.getElementById("nav-profile");

        if (user) {
          if (logoutLink) logoutLink.style.display = "inline";
          if (profileLink) profileLink.style.display = "inline";
        }

        if (logoutLink) {
          logoutLink.addEventListener("click", e => {
            e.preventDefault();
            localStorage.removeItem("user");
            window.location.href = "../auth/login.html";
          });
        }
      });

    fetch("../components/footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer-placeholder").innerHTML = html);
  </script>

</body>
</html>
